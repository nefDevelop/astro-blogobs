<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain and Tea - Admin</title>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/admin/cms.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;800&display=swap">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>

<body>
    <!-- Background Highlight (Blog Parity) -->
    <div class="top-gradient-highlight"></div>

    <!-- Navbar (Exact Blog Parity) -->
    <header>
        <div class="nav-inner onload-animation">
            <a href="#" id="btn-dashboard-logo"
                class="btn-plain scale-animation rounded-lg h-13 px-5 font-bold active:scale-95">
                <div class="flex items-center gap-3 text-md">
                    <iconify-icon icon="material-symbols:eco-rounded"
                        style="color: var(--primary); font-size: 1.75rem;"></iconify-icon>
                    <span class="font-bold text-lg tracking-tight">Rain and Tea</span>
                </div>
            </a>

            <nav id="nav-actions" class="hidden flex items-center gap-2">
                <button id="btn-dashboard" class="btn-plain scale-animation rounded-lg w-11 h-11 active:scale-90"
                    title="Dashboard">
                    <iconify-icon icon="material-symbols:dashboard-outline-rounded"
                        class="text-[1.25rem]"></iconify-icon>
                </button>
                <button id="btn-new-post" class="btn-plain scale-animation rounded-lg w-11 h-11 active:scale-90"
                    title="Nuevo Post">
                    <iconify-icon icon="material-symbols:add-circle-outline-rounded"
                        class="text-[1.25rem]"></iconify-icon>
                </button>
                <div style="width: 1px; height: 1.5rem; background: var(--line-divider); margin: 0 0.5rem;"></div>
                <button id="btn-logout" class="btn-plain scale-animation rounded-lg w-11 h-11 active:scale-90"
                    style="color: #ef4444;" title="Cerrar Sesión">
                    <iconify-icon icon="material-symbols:logout-rounded" class="text-[1.25rem]"></iconify-icon>
                </button>
            </nav>
        </div>
    </header>

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-100 flex items-center justify-center p-4">
        <div class="float-panel p-9 max-w-md w-full text-center onload-animation">
            <iconify-icon icon="material-symbols:lock-person-outline-rounded"
                style="font-size: 3.75rem; color: var(--primary); margin-bottom: 1rem;"></iconify-icon>
            <h1 class="text-2xl font-bold mb-2">Acceso al Sistema</h1>
            <p class="text-sm opacity-70 mb-8">Gestiona el contenido de tu blog directamente desde GitHub.</p>

            <div class="flex flex-col gap-4 text-left">
                <div>
                    <label class="cms-label">GitHub Token</label>
                    <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxx" class="cms-input">
                </div>
                <button id="btn-login" class="btn-regular w-full py-3"
                    style="background: var(--primary); color: white; border: none;">
                    Iniciar Sesión
                </button>
            </div>
            <p class="mt-8 text-xs opacity-50 italic">Tus datos se guardan solo en tu navegador.</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="pt-24 pb-12">
        <div class="cms-container" id="content-area">
            <!-- Initial Loading -->
            <div class="flex justify-center py-20">
                <iconify-icon icon="svg-spinners:ring-resize"
                    style="color: var(--primary); font-size: 3rem;"></iconify-icon>
            </div>
        </div>
    </main>

    <!-- Templates -->
    <template id="tpl-list">
        <main class="cms-container pt-24 pb-12">
            <!-- Sidebar Overlay (Mobile) -->
            <div id="sidebar-overlay" class="sidebar-overlay"></div>

            <!-- Dashboard -->
            <div id="dashboard">
                <div class="flex items-center justify-between mb-8 onload-animation">
                    <div class="flex items-center gap-3">
                        <button id="sidebar-toggle" class="btn-plain scale-animation rounded-lg">
                            <iconify-icon icon="material-symbols:menu-rounded"
                                style="font-size: 1.5rem;"></iconify-icon>
                        </button>
                        <h2 class="section-header text-3xl">Dashboard</h2>
                    </div>
                    <div class="flex items-center gap-6 cms-controls-row">
                        <div class="cms-search-wrapper">
                            <div class="cms-search-icon">
                                <iconify-icon icon="material-symbols:search-rounded"></iconify-icon>
                            </div>
                            <input type="text" id="dashboard-search" class="cms-input cms-search-input"
                                placeholder="Buscar artículos...">
                        </div>
                        <div class="layout-toggle-container">
                            <select id="dashboard-sort" class="cms-input cms-sort-select">
                                <option value="newest">Fecha (↓)</option>
                                <option value="oldest">Fecha (↑)</option>
                                <option value="title">Nombre (A-Z)</option>
                            </select>
                            <div class="cms-v-divider"></div>
                            <button id="view-grid" class="layout-toggle-btn active-tab" title="Vista Cuadrícula">
                                <iconify-icon icon="material-symbols:grid-view-rounded"></iconify-icon>
                            </button>
                            <button id="view-list" class="layout-toggle-btn" title="Vista Lista">
                                <iconify-icon icon="material-symbols:view-list-rounded"></iconify-icon>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="dashboard-layout">
                    <div class="sidebar-column flex flex-col gap-6">
                        <!-- Sidebar Filters -->
                        <aside id="cms-sidebar" class="cms-sidebar onload-animation" style="animation-delay: 0.1s;">
                            <div class="sidebar-section">
                                <div class="sidebar-title">Contenido</div>
                                <div id="main-nav" class="sidebar-list">
                                    <div class="sidebar-item active" data-type="posts">
                                        <iconify-icon icon="material-symbols:article-outline-rounded"></iconify-icon>
                                        <span>Posts</span>
                                    </div>
                                    <div class="sidebar-item" data-type="pages">
                                        <iconify-icon
                                            icon="material-symbols:description-outline-rounded"></iconify-icon>
                                        <span>Páginas</span>
                                    </div>
                                    <div class="sidebar-item" data-type="projects">
                                        <iconify-icon
                                            icon="material-symbols:rocket-launch-outline-rounded"></iconify-icon>
                                        <span>Proyectos</span>
                                    </div>
                                    <div class="sidebar-item" data-type="events">
                                        <iconify-icon
                                            icon="material-symbols:event-available-outline-rounded"></iconify-icon>
                                        <span>Eventos</span>
                                    </div>
                                    <div class="sidebar-item" data-type="tags">
                                        <iconify-icon icon="material-symbols:tag-rounded"></iconify-icon>
                                        <span>Etiquetas</span>
                                    </div>
                                </div>
                            </div>

                            <div class="sidebar-section">
                                <div class="sidebar-title">Categorías</div>
                                <div id="sidebar-categories" class="sidebar-list">
                                </div>
                            </div>
                        </aside>

                        <!-- Tag Cloud Panel -->
                        <div class="tag-cloud-panel onload-animation" style="animation-delay: 0.2s;">
                            <div class="sidebar-title px-4 pt-4 pb-2">Nube de Etiquetas</div>
                            <div id="sidebar-tags" class="tag-cloud-content flex flex-wrap gap-2 p-4">
                            </div>
                        </div>
                    </div>

                    <!-- Post List Area -->
                    <div id="posts-container" class="posts-container grid-mode">
                        <div id="posts-grid" class="cms-grid-post-list">
                            <!-- Post cards go here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <template id="tpl-editor">
        <div class="onload-animation space-y-8">
            <!-- Editor Title bar -->
            <div class="flex items-center justify-between sticky top-16 z-40 py-4"
                style="background: var(--page-bg); border-bottom: 1px solid var(--line-divider);">
                <div class="flex items-center gap-6">
                    <h2 class="section-header text-xl">Editor Post</h2>
                    <div class="flex p-1 bg-(--btn-regular-bg) rounded-lg scale-90">
                        <button id="mode-visual" class="btn-plain px-4 py-1.5 text-xs font-bold active-tab"
                            style="border-radius: 6px;">Config</button>
                        <button id="mode-raw" class="btn-plain px-4 py-1.5 text-xs font-bold"
                            style="border-radius: 6px;">Markdown</button>
                        <button id="mode-preview" class="btn-plain px-4 py-1.5 text-xs font-bold"
                            style="border-radius: 6px;">Preview</button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="btn-cancel"
                        class="btn-plain px-5 py-2 text-sm font-bold border rounded-lg">Cancelar</button>
                    <button id="btn-save" class="btn-regular"
                        style="background: var(--primary); color: white; border: none;">Guardar Cambios</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md-grid-cols-12 gap-8 items-start">
                <!-- Panel Lateral Metadata -->
                <div id="fm-panel" class="md-col-span-4 space-y-6">
                    <div class="float-panel p-6 space-y-6">
                        <h3 class="section-header text-sm tracking-widest uppercase opacity-80">Metadata</h3>
                        <div class="flex flex-col gap-4">
                            <div>
                                <label class="cms-label">Nombre del archivo</label>
                                <input type="text" id="post-filename" class="cms-input font-mono">
                            </div>
                            <div>
                                <label class="cms-label">Título del Post</label>
                                <input type="text" id="fm-title" class="cms-input">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="cms-label">Fecha</label>
                                    <input type="date" id="fm-published" class="cms-input">
                                </div>
                                <div>
                                    <label class="cms-label">Categoría</label>
                                    <input type="text" id="fm-category" class="cms-input">
                                </div>
                            </div>
                            <div>
                                <label class="cms-label">Descripción / Extracto</label>
                                <textarea id="fm-description" rows="5" class="cms-textarea text-sm"></textarea>
                            </div>
                            <div>
                                <label class="cms-label">Tags (coma)</label>
                                <input type="text" id="fm-tags" class="cms-input" placeholder="astro, blog, tutorial">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Panel Principal Editor/Preview -->
                <div id="content-panel" class="md-col-span-8 h-full">
                    <!-- Markdown Editor -->
                    <div id="markdown-container" class="float-panel flex flex-col overflow-hidden"
                        style="min-height: calc(100vh - 280px);">
                        <div class="cms-toolbar">
                            <button class="toolbar-btn" data-type="note" title="Nota"><iconify-icon
                                    icon="material-symbols:info-rounded" class="text-xl"></iconify-icon></button>
                            <button class="toolbar-btn" data-type="tip" title="Tip"><iconify-icon
                                    icon="material-symbols:lightbulb-rounded" class="text-xl"></iconify-icon></button>
                            <button class="toolbar-btn" data-type="warning" title="Aviso"><iconify-icon
                                    icon="material-symbols:warning-rounded" class="text-xl"></iconify-icon></button>
                            <button class="toolbar-btn" data-type="important" title="Importante"><iconify-icon
                                    icon="material-symbols:priority-high-rounded"
                                    class="text-xl"></iconify-icon></button>
                            <div class="toolbar-divider"></div>
                            <button class="toolbar-btn" data-type="github" title="Repo"><iconify-icon
                                    icon="fa6-brands:github" class="text-xl"></iconify-icon></button>
                        </div>
                        <textarea id="post-content" class="flex-1 w-full p-9 font-mono text-sm"
                            style="background: transparent; resize: none; border: none; outline: none; line-height: 1.8; color: var(--text-primary);"
                            placeholder="Escribe tu contenido aquí..."></textarea>
                    </div>

                    <!-- Live Preview -->
                    <div id="preview-container" class="float-panel hidden overflow-y-auto p-9"
                        style="min-height: calc(100vh - 280px);">
                        <div id="preview-area"></div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="/admin/cms.js"></script>
</body>

</html>
